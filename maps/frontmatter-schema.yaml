# HAR Frontmatter Schema

Canonical YAML frontmatter for HAR calendar entries.

```yaml
---
type: action                   # Always "action"
date: 2026-06-25               # YYYY-MM-DD
weekday: Thursday               # Monday-Sunday
time: "09:00"                   # HH:MM start time (24h, quoted string)
activity: Project Work          # Human-readable activity name
duration: 120                   # Integer minutes
category: work                  # One of: health, work, creative, personal, social, gaming, uncategorized
subcategory: context-game       # Free-form within category
source: scribe                  # Always "scribe"
capture_mode: conversational    # Always "conversational"
custom_fields:                  # Optional — stat tracking
  key: value
  exercises:                    # List of exercises with sets/reps
    - name: Pike Pushups        # Exercise name (extracted for public registry tags)
      sets:
        - reps: 10
  evidence:                     # Optional — link-based evidence
    - type: url
      label: "UDisc Scorecard"
      url: "https://udisc.com/rounds/abc123"
public_action_id: project-work  # Optional — for opt-in public record matching
---
```

## Categories

| Category | Keywords |
|----------|----------|
| health | workout, exercise, disc golf, practice, walk, run, stretch, yoga, mobility |
| work | project, dev, development, code, writing, research, planning, meeting |
| creative | music, guitar, production, song, creative, art |
| personal | lunch, breakfast, dinner, relaxation, reset, rituals, wind-down, decompression |
| social | hang out, friend, family, sister, social, phone, call |
| gaming | game, play, nintendo, entertainment |
| uncategorized | Anything that doesn't fit the above |

## About This File

This is the canonical schema for HAR entries. The AGENTS.md has the same information in a more readable format. This file exists as a machine-readable reference for agent implementations that validate frontmatter programmatically.
